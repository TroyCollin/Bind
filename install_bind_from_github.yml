---
- name: Install BIND9 and Sync Config from TroyCollin/Bind
  hosts: dns_servers
  become: yes
  tasks:
    - name: Ensure BIND9 and Git are installed
      ansible.builtin.apt:
        name: 
          - bind9
          - git
        state: present
        update_cache: yes

    - name: Clone configuration from GitHub
      ansible.builtin.git:
        repo: 'https://github.com/TroyCollin/Bind.git'
        dest: /tmp/bind_git_repo
        version: main
        force: yes  # Overwrites local changes in /tmp to stay synced with GitHub

    - name: Deploy BIND configuration files
      ansible.builtin.copy:
        src: "/tmp/bind_git_repo/{{ item }}"
        dest: "/etc/bind/{{ item }}"
        owner: root
        group: bind
        mode: '0644'
        remote_src: yes  # Tells Ansible the 'src' is already on the target machine
      loop:
        - named.conf.options
        - named.conf.local
        - db.local.domain
      notify: Restart BIND

  handlers:
    - name: Restart BIND
      ansible.builtin.service:
        name: bind9
        state: restarted
